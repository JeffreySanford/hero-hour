name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      # This enables task distribution via Nx Cloud
      # Run this command as early as possible, before dependencies are installed
      # Learn more at https://nx.dev/ci/reference/nx-cloud-cli#npx-nxcloud-startcirun
      - run: npx nx start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="e2e-ci"

      # Cache node_modules
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.5'

      - run: cd apps/mobile_flutter && flutter pub get
      - run: cd apps/mobile_flutter && flutter test
      - run: cd apps/mobile_flutter && flutter test --dart-define=ENABLE_FLUTTER_API_INTEGRATION=true

      - name: Ensure Docker services are ready (redis + teklif)
        run: pnpm run docker:teklif:ci-check

      - name: Smoke check coverage for api + admin-console
        run: |
          pnpm exec nx test api --code-coverage --no-watch
          pnpm exec nx test admin-console --code-coverage --no-watch

      - name: E2E contract gate (auth/login, health, life-profile)
        run: pnpm run test:ci:life-profile

      # Prepend any command with "nx record --" to record its logs to Nx Cloud
      - run: npx nx record -- npx nx format:check  --base="remotes/origin/main"
      - run: npx nx run-many -t lint test build typecheck e2e-ci
      # Nx Cloud recommends fixes for failures to help you get CI green faster. Learn more: https://nx.dev/ci/features/self-healing-ci
      - run: npx nx fix-ci
        if: always()

  ci-flutter:
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.5'

      - run: cd apps/mobile_flutter && flutter pub get
      - run: cd apps/mobile_flutter && flutter test
      - run: cd apps/mobile_flutter && flutter test --dart-define=ENABLE_FLUTTER_API_INTEGRATION=true
