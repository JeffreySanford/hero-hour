version: '3.9'
services:
  hero-teklif:
    build:
      context: ./services/hero-teklif
      dockerfile: Dockerfile
    container_name: hero-teklif
    environment:
      - REDIS_URL=redis://hero-redis:6379
      - NODE_ENV=production
      - TEKLIF_VERSION=1.0.0
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
