<div [ngClass]="modeService.getMode()" class="app-layout">
  <div class="app-backdrop" aria-hidden="true">
    <span class="app-backdrop__orb app-backdrop__orb--gold"></span>
    <span class="app-backdrop__orb app-backdrop__orb--teal"></span>
    <span class="app-backdrop__grid"></span>
  </div>
  <app-header (toggleSidebar)="null"></app-header>

  <div class="main-stage">
    <router-outlet></router-outlet>
  </div>

  <app-footer></app-footer>
</div>
